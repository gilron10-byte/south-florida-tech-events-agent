markets:
  - id: south_florida
    name: South Florida
    timezone: America/New_York
    cities: [Miami, Miami Beach, Fort Lauderdale, Boca Raton, West Palm Beach, Palm Beach, South Florida]
    output_file: output/south_florida_weekly_digest.md
    cache_file: data/south_florida_last_successful_events.json
    primary_sources:
      - name: Refresh Miami Events
        url: https://refreshmiami.com/events/
        event_selector: article
        max_events: 20
      - name: Tech Hub South Florida Events
        url: https://techhubsouthflorida.org/events/
        event_selector: article
        max_events: 20
      - name: Eventbrite Miami Tech Events
        url: https://www.eventbrite.com/d/fl--miami/technology--events/
        max_events: 15
        enabled: false
    discovery_groups:
      - name: Eventbrite Search Discovery
        type: search_discovery
        category: Eventbrite
        max_events: 25
        results_per_query: 10
        queries:
          - 'site:eventbrite.com/e/ Miami AI startup cloud'
          - 'site:eventbrite.com/e/ "Fort Lauderdale" AI startup tech'
          - 'site:eventbrite.com/e/ "West Palm Beach" technology startup'
          - 'site:eventbrite.com/e/ "Boca Raton" AI cloud SaaS'
          - 'site:eventbrite.com/e/ Miami AWS Azure DevOps cybersecurity SaaS'
      - name: Luma / lu.ma Discovery
        type: search_discovery
        category: Luma
        max_events: 25
        results_per_query: 10
        queries: ['site:lu.ma Miami AI startup founder cloud','site:lu.ma "Miami Tech Week" AI founder VC','site:lu.ma "Fort Lauderdale" startup AI','site:lu.ma "Palm Beach" tech founder','site:lu.ma Miami founders VC AI','site:lu.ma Miami SaaS startup']
      - name: Meetup Discovery
        type: search_discovery
        category: Meetup
        max_events: 25
        results_per_query: 10
        queries: ['site:meetup.com Miami AI startup technology','site:meetup.com "Fort Lauderdale" technology startup','site:meetup.com "West Palm Beach" tech AI','site:meetup.com "Boca Raton" technology meetup','site:meetup.com Miami cybersecurity meetup','site:meetup.com Miami product startup']
      - name: FAU / Boca / Palm Beach Innovation Discovery
        type: search_discovery
        category: FAU / Boca / Palm Beach Innovation
        max_events: 25
        results_per_query: 10
        queries: ['site:fau.edu "Tech Runway" events','site:research-park.org events Boca Raton technology','site:bric.com events Boca Raton tech','"Boca Raton Innovation Campus" tech events','Boca Raton startup tech events','Palm Beach tech startup events','West Palm Beach innovation technology events']
      - name: Cybersecurity Discovery
        type: search_discovery
        category: Cybersecurity
        max_events: 25
        results_per_query: 10
        queries: ['site:hackmiami.org events cybersecurity Miami','site:eventbrite.com/e/ HackMiami cybersecurity Miami','site:meetup.com Miami cybersecurity meetup','Miami cybersecurity cloud security events','Fort Lauderdale cybersecurity technology events','South Florida CISO cybersecurity events']
      - name: University / Innovation Ecosystem Discovery
        type: search_discovery
        category: University / Innovation Ecosystem
        max_events: 25
        results_per_query: 10
        queries: ['site:miami.edu events AI technology entrepreneurship','site:fiu.edu events cybersecurity AI entrepreneurship','site:mdc.edu events AI technology Miami','University of Miami startup technology event','FIU cybersecurity startup event','Miami Dade College AI technology event','NSU Levan Center technology startup event','site:nova.edu Levan Center technology events']
      - name: Israeli / Jewish Business & Tech Discovery
        type: search_discovery
        category: Israeli / Jewish Business & Tech
        max_events: 30
        results_per_query: 10
        queries: ['Israeli business community Miami events','Israeli entrepreneurs Miami events','Israeli tech founders Miami','Israeli founders South Florida','Israeli entrepreneurs Boca Raton','Israeli business Palm Beach events','Jewish business networking Miami tech','Jewish entrepreneurs Boca Raton events','IAC South Florida events','Israeli American Council Miami events','Jewish Federation Miami Israel business event','Jewish Federation South Palm Beach business networking','Jewish Federation Broward business professionals','Israel Florida business events','Florida Israel Business Accelerator Israeli tech events','Israel Florida Chamber of Commerce events','site:lu.ma Miami Israeli founders','site:lu.ma Miami Israel startup','site:eventbrite.com/e/ Miami Israeli tech','site:meetup.com Miami Israeli entrepreneurs','site:refreshmiami.com Israeli startup Miami','site:techhubsouthflorida.org Israeli tech']
      - name: Cloud Provider Events
        type: search_discovery
        category: Cloud / Hyperscaler
        max_events: 30
        results_per_query: 10
        queries: ['site:aws.amazon.com/events Miami AWS startup','site:aws.amazon.com/events AWS GenAI startup Miami','AWS Miami startup cloud event','AWS GenAI Miami event','AWS ISV Miami event','AWS partner Miami event','site:cloud.google.com/events Miami Google Cloud AI startup','Google Cloud Miami startup event','GCP Miami cloud AI event','Google Cloud cybersecurity data AI event Miami','site:microsoft.com/events Miami Azure AI startup','site:events.microsoft.com Miami Azure AI','Microsoft Azure Miami startup event','Microsoft for Startups Miami event']
