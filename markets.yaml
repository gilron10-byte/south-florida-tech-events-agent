      - {name: Israeli / Jewish Business & Tech Discovery, type: search_discovery, category: Israeli / Jewish Business & Tech, max_events: 25, results_per_query: 10, queries: ['New York Israeli founders tech events','Israeli entrepreneurs New York events','Israeli tech founders New York','Jewish business networking New York tech','Israeli startup New York event','Israel business New York technology event','site:lu.ma New York Israeli founders','site:eventbrite.com/e/ New York Israeli tech','site:meetup.com New York Israeli entrepreneurs']}
      - {name: VC / SaaS / Enterprise Tech Discovery, type: search_discovery, category: VC / SaaS / Enterprise Tech, max_events: 25, results_per_query: 10, queries: ['New York SaaS enterprise tech event','New York VC SaaS founder event','New York enterprise AI event','New York product leadership technology event','New York CTO CPO technology event']}
      - {name: Cloud Provider Events, type: search_discovery, category: Cloud / Hyperscaler, max_events: 30, results_per_query: 10, queries: ['site:aws.amazon.com/events "New York" AWS startup','site:aws.amazon.com/events AWS AI startup New York','AWS New York startup cloud event','AWS startup Loft New York events','site:cloud.google.com/events "New York" Google Cloud startup','Google Cloud New York AI startup event','GCP New York startup event','site:microsoft.com/events "New York" Azure AI startup','site:events.microsoft.com "New York" Azure startup','Microsoft Azure New York AI startup event','Microsoft for Startups New York event']}
